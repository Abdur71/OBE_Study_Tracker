<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - OBE Study Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    :root {
      --ink: #f8fafc;
      --muted: #cbd5e1;
      --line: rgba(148, 163, 184, 0.22);
      --panel: rgba(15, 23, 42, 0.76);
      --panel-strong: rgba(2, 6, 23, 0.86);
      --teal: #2dd4bf;
    }
    body {
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 5%, rgba(45, 212, 191, 0.28), transparent 30%),
        radial-gradient(circle at 85% 10%, rgba(244, 63, 94, 0.18), transparent 26%),
        linear-gradient(135deg, #020617 0%, #111827 48%, #042f2e 100%);
      background-attachment: fixed;
    }
    button { border-radius: 8px !important; }
    .card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(145deg, rgba(15, 23, 42, 0.88), rgba(30, 41, 59, 0.62));
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.36);
      backdrop-filter: blur(16px);
    }
    .text-gray-500 { color: var(--muted) !important; }
    .btn-primary {
      background: #0f766e !important;
      color: #ffffff !important;
      border: 1px solid #0f766e !important;
    }
    .btn-primary:hover {
      background: #115e59 !important;
      border-color: #115e59 !important;
    }
  </style>
</head>
<body class="min-h-screen">
  <section id="authScreen" class="min-h-screen flex items-center justify-center p-5">
    <div class="card w-full max-w-md p-8 text-center">
      <img src="https://images.unsplash.com/photo-1434030216411-0b793f4b4173?auto=format&fit=crop&w=220&q=80" alt="Study desk" class="w-20 h-20 object-cover mx-auto" style="border-radius: 8px;" />
      <h1 class="text-3xl font-bold mt-5">OBE Study Tracker</h1>
      <p class="text-gray-500 mt-3">Sign in to keep your semesters, subjects, and marks connected to your account.</p>
      <button id="googleLoginBtn" class="btn-primary w-full font-semibold px-5 py-3 mt-6 transition" type="button">
        Continue with Google
      </button>
      <p id="authStatus" class="text-sm text-gray-500 mt-4">Supabase Google login required.</p>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://fimgelkqcznktfuubbdb.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpbWdlbGtxY3pua3RmdXViYmRiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NzUxMjcsImV4cCI6MjA5MjI1MTEyN30.p9JAU1hCN0OZbd7Af5fIVNsPyERzPj1buCyD7Oayh4Q";

    const isSupabaseConfigured = !SUPABASE_URL.includes("YOUR_") && !SUPABASE_ANON_KEY.includes("YOUR_");
    const canUseSupabase = isSupabaseConfigured && Boolean(window.supabase);
    const supabaseClient = canUseSupabase
      ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
      : null;

    const authStatus = document.getElementById("authStatus");

    async function initializeAuth() {
      if (!canUseSupabase) {
        authStatus.textContent = "Configure SUPABASE_URL and SUPABASE_ANON_KEY.";
        return;
      }

      const { data, error } = await supabaseClient.auth.getSession();
      if (data.session?.user) {
        window.location.href = 'index.html';
        return;
      }

      supabaseClient.auth.onAuthStateChange(async (_event, session) => {
        if (session?.user) {
          window.location.href = 'index.html';
        }
      });
    }

    async function signInWithGoogle() {
      if (!canUseSupabase) {
        authStatus.textContent = "Add your Supabase URL and anon key first.";
        return;
      }

      const { error } = await supabaseClient.auth.signInWithOAuth({
        provider: "google",
        options: {
          redirectTo: new URL('index.html', window.location.href).href
        }
      });
      if (error) authStatus.textContent = error.message || "Google login failed";
    }

    document.getElementById("googleLoginBtn").addEventListener("click", signInWithGoogle);
    initializeAuth();

    const urlParams = new URLSearchParams(window.location.search);
    const msg = urlParams.get('msg');
    if (msg) {
       authStatus.textContent = msg;
    }
  </script>
</body>
</html>
